# PROJECT.yaml — Machine-readable API specification
# Keep this in sync with the codebase at all times.

name: blockhost-provisioner-libvirt
version: "0.2.0"
description: >
  libvirt/KVM VM provisioning backend for BlockHost.
  Implements the provisioner contract using virsh + cloud-init.
  Proof-of-concept for the provisioner abstraction layer.

package:
  name: blockhost-provisioner-libvirt
  architecture: all
  depends:
    - python3 (>= 3.10)
    - blockhost-common (>= 0.1.0)
    - blockhost-engine-evm (>= 0.1.0)
  recommends:
    - qemu-kvm
    - libvirt-daemon-system
    - libvirt-clients
    - virtinst
    - cloud-image-utils
    - libguestfs-tools

manifest:
  path: /usr/share/blockhost/provisioner.json
  name: libvirt
  display_name: "libvirt/KVM + cloud-init"

entry_points:
  blockhost-vm-create:
    source: scripts/vm-create.py
    status: implemented
    notes: >
      Bridge mode (Linux bridge from first-boot), IPv6 routed via bridge.
      Generates MAC address (QEMU OUI 52:54:00), used in both domain XML
      and cloud-init network-config for static IP via MAC match.
      NFT token ID is optional (--nft-token-id); engine calls update-gecos
      after minting to set the actual token ID.
      Gateway from libvirt network XML, fallback to bridge IP / db.yaml.
      IPv6 default route via broker prefix gateway (link-scoped host route).
      After domain start, sets bridge port isolation on the VM's tap interface
      via root agent (bridge-port-isolate action) to prevent inter-VM L2 traffic.
      Non-fatal — VM creation succeeds even if isolation fails.
    args:
      - name: name
        type: positional
        required: true
        description: VM name
      - name: --owner-wallet
        type: string
        required: true
        description: Owner wallet address (0x...)
      - name: --nft-token-id
        type: int
        default: null
        description: NFT token ID (optional — engine calls update-gecos after minting)
      - name: --cpu
        type: int
        default: 1
        description: Number of vCPUs
      - name: --memory
        type: int
        default: 2048
        description: Memory in MB
      - name: --disk
        type: int
        default: 20
        description: Disk size in GB
      - name: --apply
        type: flag
        description: Actually create the VM
      - name: --cloud-init-content
        type: path
        description: Path to pre-rendered cloud-init YAML
      - name: --username
        type: string
        default: admin
        description: VM login username
      - name: --expiry-days
        type: int
        default: 30
        description: Days until VM expires
      - name: --mock
        type: flag
        description: Use mock database
    output:
      format: json
      schema:
        status: ok|error
        vm_name: string
        ip: string
        ipv6: string
        vmid: string  # domain name for libvirt
        nft_token_id: int
        username: string

  blockhost-vm-destroy:
    source: scripts/vm-destroy.sh
    status: implemented
    args: ["name"]
    notes: Must be idempotent

  blockhost-vm-start:
    source: scripts/vm-start.sh
    status: implemented
    args: ["name"]
    notes: >
      After successful start, re-applies bridge port isolation on the new tap
      interface (lost when VM was stopped). Non-fatal — start succeeds even if
      isolation fails.

  blockhost-vm-stop:
    source: scripts/vm-stop.sh
    status: implemented
    args: ["name"]
    notes: Graceful ACPI shutdown

  blockhost-vm-kill:
    source: scripts/vm-kill.sh
    status: implemented
    args: ["name"]
    notes: Force stop (virsh destroy)

  blockhost-vm-status:
    source: scripts/vm-status.sh
    status: implemented
    args: ["name"]
    output: "active|suspended|destroyed|unknown"
    notes: Exit 0 always

  blockhost-vm-list:
    source: scripts/vm-list.sh
    status: implemented
    args: ["--format json"]
    output: Tab-separated or JSON array

  blockhost-vm-gc:
    source: scripts/vm-gc.py
    status: implemented
    args: ["--execute", "--suspend-only", "--destroy-only", "--grace-days N", "--mock", "--verbose"]
    notes: >
      Two-phase garbage collection. Phase 1 shuts down expired active VMs
      and marks them suspended. Phase 2 destroys suspended VMs past the
      grace period (default from db.yaml gc_grace_days, or 7) by shelling
      out to blockhost-vm-destroy. Dry-run by default; pass --execute to
      actually act. Designed to run from systemd timer as the blockhost user.

  blockhost-vm-resume:
    source: scripts/vm-resume.py
    status: implemented
    args: ["name", "--extend-days N", "--mock", "--dry-run"]
    notes: >
      Resumes a suspended VM: virsh-start via root agent, re-applies
      bridge port isolation (libvirt creates a fresh tap on start), and
      marks active in DB with new expiry. --extend-days defaults to
      db.yaml's default_expiry_days (or 30).

  blockhost-vm-update-gecos:
    source: scripts/vm-update-gecos.py
    status: implemented
    notes: >
      Updates VM user GECOS field via QEMU guest agent.
      Called by engine reconciler on NFT ownership transfer.
      Delegates to blockhost-vm-guest-exec with a `usermod -c` command so all
      in-VM execution flows through a single primitive.
      VM must be running with responsive guest agent.
    args:
      - name: name
        type: positional
        required: true
        description: VM name (libvirt domain name)
      - name: wallet_address
        type: positional
        required: true
        description: New owner wallet address
      - name: --nft-id
        type: string
        required: true
        description: NFT token ID

  blockhost-vm-guest-exec:
    source: scripts/vm-guest-exec.py
    status: implemented
    notes: >
      Generic primitive: runs a shell command inside a running VM via the
      QEMU guest agent (/bin/sh -c <command>). Used by the network hook
      (pushing .onion into /etc/hosts, updating signing URL) and by
      update-gecos. Prints the command's stdout to stdout, stderr to stderr,
      and exits with the command's exit code. Commands >4KB may fail — not
      suitable for large payloads (use guest-file-* for those).
    args:
      - name: name
        type: positional
        required: true
        description: VM name (libvirt domain name)
      - name: command
        type: remainder
        required: true
        description: Shell command to run inside the VM

  blockhost-vm-metrics:
    source: scripts/vm-metrics.py
    status: implemented
    notes: >
      Collects CPU, memory, disk I/O, network metrics via virsh domstats
      (single call). Guest agent provides disk usage, uptime, and connection
      count (skipped with -1 if agent unresponsive). Rate fields (IOPS,
      bytes/sec) delta'd against previous sample in /var/lib/blockhost/metrics/.
    args:
      - name: name
        type: positional
        required: true
        description: VM name
    output:
      format: json
      schema:
        cpu_percent: float
        cpu_count: int
        memory_used_mb: int
        memory_total_mb: int
        disk_used_mb: int
        disk_total_mb: int
        disk_read_iops: int
        disk_write_iops: int
        disk_read_bytes_sec: int
        disk_write_bytes_sec: int
        net_rx_bytes_sec: int
        net_tx_bytes_sec: int
        net_connections: int
        guest_agent_responsive: bool
        uptime_seconds: int
        state: string

  blockhost-vm-throttle:
    source: scripts/vm-throttle.py
    status: implemented
    notes: >
      Applies resource limits via virsh schedinfo (CPU), domiftune (bandwidth),
      blkdeviotune (IOPS). All through libvirtd with --live flag. Options are
      additive. --reset restores all defaults. VM must be running.
    args:
      - name: name
        type: positional
        required: true
        description: VM name
      - name: --cpu-shares
        type: int
        description: "CPU weight (1-10000, default 1024)"
      - name: --cpu-quota
        type: int
        description: "Hard CPU cap as percent of allocated vCPUs (1-100)"
      - name: --bandwidth-in
        type: int
        description: "Inbound bandwidth limit in kbps (0=unlimited)"
      - name: --bandwidth-out
        type: int
        description: "Outbound bandwidth limit in kbps (0=unlimited)"
      - name: --iops-read
        type: int
        description: "Read IOPS limit (0=unlimited)"
      - name: --iops-write
        type: int
        description: "Write IOPS limit (0=unlimited)"
      - name: --reset
        type: flag
        description: "Remove all limits, restore defaults"

  blockhost-build-template:
    source: scripts/build-template.sh
    status: implemented
    notes: >
      Builds qcow2 base image with libguestfs. Installs ALL .deb packages
      found in /var/lib/blockhost/template-packages/ (libpam-web3, chain-specific
      PAM plugins, etc.) via a single dpkg -i pass. Fails if no template
      packages are found.

  blockhost-provisioner-detect:
    source: scripts/provisioner-detect.sh
    status: implemented
    notes: "Exit 0 if virsh available, 1 otherwise"

root_agent_actions:
  module: root-agent-actions/virsh.py
  actions:
    virsh-start:
      params: {domain: string}
      runs: "virsh start <domain>"
    virsh-destroy:
      params: {domain: string}
      runs: "virsh destroy <domain>"
      notes: Force stop (not deletion)
    virsh-shutdown:
      params: {domain: string}
      runs: "virsh shutdown <domain>"
      notes: Graceful ACPI, 300s timeout
    virsh-define:
      params: {xml_path: string}
      runs: "virsh define <xml_path>"
      notes: xml_path must be under /var/lib/blockhost/
    virsh-undefine:
      params: {domain: string, remove_storage: bool}
      runs: "virsh undefine <domain> [--remove-all-storage]"
    virsh-guest-exec:
      params: {domain: string, command: string}
      runs: "virsh qemu-agent-command <domain> (guest-exec /bin/sh -c <command>)"
      notes: >
        Generic guest-exec primitive. Polls guest-exec-status for completion,
        returns {ok, exitcode, stdout, stderr}. Command string is run inside
        the VM — shell metacharacters are expected, not filtered (the boundary
        is VM-internal). Command size capped at ~4KB (guest-agent limit).

wizard:
  module: blockhost.provisioner_libvirt.wizard
  session_key: libvirt
  exports:
    - blueprint
    - get_finalization_steps
    - get_summary_data
    - get_summary_template
    - get_ui_params
  routes:
    - GET /wizard/libvirt
    - POST /wizard/libvirt
  ui_params: {}  # empty — no web management UI
  finalization_steps:
    - id: storage
      display: "Configure storage pool"
      function: finalize_storage
      status: implemented
    - id: network
      display: "Configure network"
      function: finalize_network
      status: implemented
    - id: db_config
      display: "Writing provisioner config"
      function: finalize_db_config
      status: implemented
      notes: >
        Writes /etc/blockhost/db.yaml with provisioner runtime config:
        db_file, storage_pool, storage_path, bridge, gc_grace_days, ip_pool.
        Runs after finalize_network so the discovered bridge is available.
    - id: template
      display: "Build VM template"
      function: finalize_template
      hint: "(this may take several minutes)"
      status: implemented

first_boot_hook:
  path: provisioner-hooks/first-boot.sh
  installs:
    - qemu-kvm
    - libvirt-daemon-system
    - libvirt-clients
    - virtinst
    - cloud-image-utils
    - libguestfs-tools
    - python3-ecdsa
    - jq
  step_markers:
    - .step-libvirt
    - .step-kvm-check

config_keys:
  session_key: libvirt
  provisioner_config:
    - db_file
    - storage_pool
    - storage_path
    - bridge
    - gc_grace_days
    - ip_pool
  files_read:
    - path: /etc/blockhost/db.yaml
      keys: [storage_pool, bridge, gateway, ip_pool, grace_days]
    - path: /etc/blockhost/web3-defaults.yaml
      keys: [auth.otp_length, auth.otp_ttl_seconds]
    - path: /etc/blockhost/broker-allocation.json
      keys: [prefix, gateway, dns_zone]

paths:
  template_image: /var/lib/blockhost/templates/blockhost-base.qcow2
  cloud_init_dir: /var/lib/blockhost/cloud-init/
  vm_disks: /var/lib/blockhost/vms/
  template_packages: /var/lib/blockhost/template-packages/
